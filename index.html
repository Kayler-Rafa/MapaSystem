<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Mapa de Territórios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }

    /* ── MAPA FULL SCREEN ── */
    #map-container { position: fixed; inset: 0; background: #dde2e8; }
    #map-viewport {
      position: absolute; inset: 0;
      cursor: grab; user-select: none; touch-action: none;
    }
    #map-viewport.dragging { cursor: grabbing; }
    #map-inner { transform-origin: 0 0; will-change: transform; }
    #map-inner svg { display: block; }

    /* SVG quadras */
    #map-inner svg path { cursor: default; }
    #map-inner svg path.q-block { cursor: pointer; transition: opacity .12s; }
    #map-inner svg path.q-block:hover { opacity: .72; }
    #map-inner svg path.q-block.visited {
      fill: #8a8a8a !important;
      fill-opacity: 1 !important;
    }
    @keyframes flash {
      0%, 100% { stroke: transparent; stroke-width: 0; }
      40%       { stroke: #fff; stroke-width: 4px; }
    }
    #map-inner svg path.flash { animation: flash .5s ease 2; }

    /* ── TOPBAR FLUTUANTE ── */
    #topbar {
      position: fixed; top: 14px; left: 14px; right: 14px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 25; pointer-events: none;
    }
    .glass-pill {
      background: rgba(15, 23, 42, .85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 14px;
      color: #fff;
      pointer-events: auto;
    }
    #app-pill {
      padding: 9px 14px;
      font-size: 0.88rem; font-weight: 700;
      display: flex; align-items: center; gap: 7px;
    }
    #stats-pill {
      padding: 7px 13px;
      font-size: 0.78rem; font-weight: 500;
    }
    /* Stats pill: visível só no mobile */
    @media (min-width: 769px) { #stats-pill { display: none; } }

    /* ── ZOOM ── */
    #zoom-bar {
      position: fixed; left: 14px; bottom: 14px;
      display: flex; flex-direction: column; gap: 5px; z-index: 25;
    }
    .z-btn {
      width: 42px; height: 42px;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(8px);
      border: none; border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.18);
      cursor: pointer; font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: #1e293b; transition: background .12s, transform .1s;
    }
    .z-btn:hover  { background: #fff; }
    .z-btn:active { transform: scale(.93); }

    /* ── PAINEL DE TERRITÓRIOS (desktop: floating right) ── */
    #panel {
      position: fixed;
      top: 14px; right: 14px; bottom: 14px;
      width: 290px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,.14);
      display: flex; flex-direction: column;
      z-index: 20;
      overflow: hidden;
    }

    /* Handle — oculto no desktop */
    #panel-handle { display: none; }

    /* Cabeçalho do painel */
    #panel-head {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .ph-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .ph-title { font-size: 0.72rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .07em; }
    .ph-count { font-size: 0.76rem; color: #64748b; font-weight: 500; }
    .global-bar { height: 4px; background: #f1f5f9; border-radius: 2px; overflow: hidden; }
    .global-bar-fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width .4s; }

    /* Lista de territórios */
    #territory-list { flex: 1; overflow-y: auto; }
    #territory-list::-webkit-scrollbar { width: 3px; }
    #territory-list::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 2px; }

    /* Card */
    .t-card {
      padding: 11px 16px;
      border-bottom: 1px solid #f8fafc;
      cursor: pointer; transition: background .1s;
    }
    .t-card:hover { background: #f8fafc; }
    .t-card:last-child { border-bottom: none; }
    .t-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .t-dot {
      width: 13px; height: 13px; border-radius: 4px;
      border: 1.5px solid rgba(0,0,0,.15); flex-shrink: 0;
    }
    .t-name {
      font-size: 0.875rem; font-weight: 600; color: #1e293b;
      flex: 1; outline: none;
      border: 1px solid transparent; border-radius: 4px;
      padding: 1px 3px; background: transparent; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .t-name:focus { background: #f0f9ff; border-color: #7dd3fc; cursor: text; }
    .t-pct { font-size: 0.72rem; color: #94a3b8; font-weight: 500; flex-shrink: 0; }
    .t-progress { height: 5px; background: #f1f5f9; border-radius: 3px; margin-bottom: 5px; overflow: hidden; }
    .t-bar { height: 100%; border-radius: 3px; transition: width .4s; }
    .t-info { font-size: 0.71rem; color: #94a3b8; }

    /* Rodapé do painel */
    #panel-footer { padding: 10px 14px 14px; border-top: 1px solid #f1f5f9; flex-shrink: 0; }
    #btn-reset-map {
      width: 100%; padding: 9px;
      font-size: 0.82rem; font-weight: 600;
      color: #dc2626; background: #fef2f2;
      border: 1.5px solid #fca5a5; border-radius: 10px;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #btn-reset-map:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      /* Painel vira bottom sheet */
      #panel {
        top: auto; right: 0; left: 0; bottom: 0;
        width: 100%; height: 72vh;
        border-radius: 22px 22px 0 0;
        transform: translateY(calc(100% - 82px));
        transition: transform .32s cubic-bezier(.4, 0, .2, 1);
        box-shadow: 0 -6px 30px rgba(0,0,0,.16);
      }
      #panel.open { transform: translateY(0); }

      /* Handle visível no mobile */
      #panel-handle {
        display: flex; justify-content: center;
        padding: 10px 0 2px; cursor: pointer; flex-shrink: 0;
      }
      #panel-handle span {
        width: 38px; height: 4px;
        background: #cbd5e1; border-radius: 2px; display: block;
        transition: background .15s;
      }
      #panel-handle:hover span { background: #94a3b8; }

      /* Zoom acima do peek */
      #zoom-bar { left: auto; right: 14px; bottom: 96px; }

      /* Stats pill aparece no mobile */
      #stats-pill { display: flex; }
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: #dde2e8; gap: 10px;
      font-size: 0.9rem; color: #64748b;
    }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 3px solid #cbd5e1; border-top-color: #3b82f6;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ERRO ── */
    #err {
      display: none; position: fixed; inset: 0; z-index: 50;
      align-items: center; justify-content: center; background: #f8fafc;
    }
    .err-box {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 28px 24px; max-width: 340px; text-align: center;
    }
    .err-box h2 { color: #dc2626; margin-bottom: 10px; }
    .err-box p { font-size: 0.85rem; color: #64748b; line-height: 1.6; }
    .err-box code { background: #f1f5f9; padding: 2px 7px; border-radius: 4px; font-size: 0.82rem; }
  </style>
</head>
<body>

<!-- Mapa full screen -->
<div id="map-container">
  <div id="map-viewport"><div id="map-inner"></div></div>
  <div id="loading"><div class="spinner"></div> Carregando mapa...</div>
  <div id="err">
    <div class="err-box">
      <h2>⚠️ Erro ao carregar</h2>
      <p>O mapa não pôde ser carregado.<br><br>
      Execute na pasta do projeto:<br><br>
      <code>python -m http.server 8080</code><br><br>
      Depois acesse <code>localhost:8080</code></p>
    </div>
  </div>
</div>

<!-- Topbar flutuante -->
<div id="topbar">
  <div id="app-pill" class="glass-pill">🗺️ Territórios</div>
  <div id="stats-pill" class="glass-pill">—</div>
</div>

<!-- Controles de zoom -->
<div id="zoom-bar">
  <button class="z-btn" id="z-in"  title="Ampliar">+</button>
  <button class="z-btn" id="z-out" title="Reduzir">−</button>
  <button class="z-btn" id="z-fit" title="Ajustar">⌂</button>
</div>

<!-- Painel de territórios -->
<div id="panel">
  <div id="panel-handle"><span></span></div>
  <div id="panel-head">
    <div class="ph-row">
      <span class="ph-title">Territórios</span>
      <span class="ph-count" id="panel-count">—</span>
    </div>
    <div class="global-bar"><div class="global-bar-fill" id="global-bar-fill" style="width:0%"></div></div>
  </div>
  <div id="territory-list"></div>
  <div id="panel-footer">
    <button id="btn-reset-map">↺ Resetar mapa</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Territórios (edite os nomes aqui ou na UI)
// ─────────────────────────────────────────────
const TERRITORIES = [
  { id: 'layer1', name: 'Território 1', color: '#9966cc', gid: 'g134' },
  { id: 'layer2', name: 'Território 2', color: '#08beee', gid: 'g110' },
  { id: 'layer3', name: 'Território 3', color: '#d4a26a', gid: 'g111' },
  { id: 'layer4', name: 'Território 4', color: '#d1b632', gid: 'g112' },
  { id: 'layer5', name: 'Território 5', color: '#c93d33', gid: 'g113' },
  { id: 'layer6', name: 'Território 6', color: '#0fad37', gid: 'g114' },
];

// ─────────────────────────────────────────────
//  Estado
// ─────────────────────────────────────────────
const STORE = 'mapa-territorios-v1';
let state = { visited: {}, names: {} };

function loadState() {
  try {
    const r = localStorage.getItem(STORE);
    if (r) state = Object.assign({ visited: {}, names: {} }, JSON.parse(r));
  } catch (_) {}
}
function saveState() {
  try { localStorage.setItem(STORE, JSON.stringify(state)); } catch (_) {}
}

// ─────────────────────────────────────────────
//  Pan & Zoom
// ─────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
let panning = false, panStart = null, dragMoved = false;

const viewport = document.getElementById('map-viewport');
const inner    = document.getElementById('map-inner');

function applyTx() {
  inner.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
}
function fitSvg(svg) {
  const vr = viewport.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const sw = vb.width  || +svg.getAttribute('width')  || 750;
  const sh = vb.height || +svg.getAttribute('height') || 1000;
  sc = Math.min(vr.width / sw, vr.height / sh) * 0.95;
  tx = (vr.width  - sw * sc) / 2;
  ty = (vr.height - sh * sc) / 2;
  applyTx();
}
function zoomAt(f, cx, cy) {
  const ns = Math.max(0.12, Math.min(12, sc * f));
  tx = cx - (cx - tx) * (ns / sc);
  ty = cy - (cy - ty) * (ns / sc);
  sc = ns; applyTx();
}

viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  panning = true; dragMoved = false;
  panStart = { ox: e.clientX - tx, oy: e.clientY - ty };
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  const nx = e.clientX - panStart.ox, ny = e.clientY - panStart.oy;
  if (Math.abs(nx - tx) + Math.abs(ny - ty) > 5) dragMoved = true;
  tx = nx; ty = ny; applyTx();
});
window.addEventListener('mouseup', () => {
  panning = false;
  viewport.classList.remove('dragging');
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoomAt(e.deltaY < 0 ? 1.12 : 0.89, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

let prevT = null, prevD = 0;
viewport.addEventListener('touchstart', e => {
  dragMoved = false;
  prevT = [...e.touches].map(t => ({ x: t.clientX, y: t.clientY }));
  if (e.touches.length === 2)
    prevD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (!prevT) return;
  if (e.touches.length === 1 && prevT.length === 1) {
    const dx = e.touches[0].clientX - prevT[0].x;
    const dy = e.touches[0].clientY - prevT[0].y;
    if (Math.abs(dx) + Math.abs(dy) > 5) dragMoved = true;
    tx += dx; ty += dy; applyTx();
    prevT = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
  } else if (e.touches.length === 2) {
    dragMoved = true;
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    const r = viewport.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    if (prevD) zoomAt(d / prevD, cx, cy);
    prevD = d;
    prevT = [...e.touches].map(t => ({ x: t.clientX, y: t.clientY }));
  }
}, { passive: true });
viewport.addEventListener('touchend', () => { prevT = null; });

function midOf() {
  const r = viewport.getBoundingClientRect();
  return [r.width / 2, r.height / 2];
}
document.getElementById('z-in').onclick  = () => { const [x,y]=midOf(); zoomAt(1.3,   x, y); };
document.getElementById('z-out').onclick = () => { const [x,y]=midOf(); zoomAt(1/1.3, x, y); };
document.getElementById('z-fit').onclick = () => { const s=inner.querySelector('svg'); if(s) fitSvg(s); };

// ─────────────────────────────────────────────
//  Quadras
// ─────────────────────────────────────────────
let svgEl = null;

function blockPaths(t) {
  if (!svgEl) return [];
  const g = svgEl.getElementById(t.gid);
  return g ? Array.from(g.querySelectorAll(':scope > path')) : [];
}
function countBlocks(t) {
  const p = blockPaths(t);
  return { done: p.filter(x => state.visited[x.id]).length, total: p.length };
}
function applyAllVisited() {
  for (const t of TERRITORIES)
    for (const p of blockPaths(t))
      p.classList.toggle('visited', !!state.visited[p.id]);
}
function setupBlockClicks() {
  for (const t of TERRITORIES) {
    for (const p of blockPaths(t)) {
      p.classList.add('q-block');
      p.addEventListener('pointerdown', () => { dragMoved = false; });
      p.addEventListener('click', e => {
        e.stopPropagation();
        if (dragMoved) return;
        state.visited[p.id] = !state.visited[p.id];
        p.classList.toggle('visited', !!state.visited[p.id]);
        saveState();
        renderSidebar();
        updateStats();
      });
    }
  }
}
function flashTerritory(t) {
  blockPaths(t).forEach(p => {
    p.classList.remove('flash');
    void p.offsetWidth;
    p.classList.add('flash');
    setTimeout(() => p.classList.remove('flash'), 1100);
  });
}

// ─────────────────────────────────────────────
//  Stats
// ─────────────────────────────────────────────
function updateStats() {
  let done = 0, total = 0;
  for (const t of TERRITORIES) { const c = countBlocks(t); done += c.done; total += c.total; }
  const txt = total ? `${done} / ${total}` : '—';
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('stats-pill').textContent = txt + ' quadras';
  document.getElementById('panel-count').textContent = txt;
  document.getElementById('global-bar-fill').style.width = pct + '%';
}

// ─────────────────────────────────────────────
//  Sidebar / painel
// ─────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderSidebar() {
  const list = document.getElementById('territory-list');
  list.innerHTML = '';
  for (const t of TERRITORIES) {
    const { done, total } = countBlocks(t);
    const pct  = total ? Math.round((done / total) * 100) : 0;
    const name = state.names[t.id] || t.name;

    const card = document.createElement('div');
    card.className = 't-card';
    card.innerHTML = `
      <div class="t-top">
        <div class="t-dot" style="background:${t.color}"></div>
        <div class="t-name" contenteditable="true" spellcheck="false">${escHtml(name)}</div>
        <span class="t-pct">${pct}%</span>
      </div>
      <div class="t-progress">
        <div class="t-bar" style="width:${pct}%;background:${t.color}"></div>
      </div>
      <div class="t-info">${done} de ${total} quadras trabalhadas</div>
    `;

    const nameEl = card.querySelector('.t-name');
    nameEl.addEventListener('click', e => e.stopPropagation());
    nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
    nameEl.addEventListener('blur', () => {
      state.names[t.id] = nameEl.textContent.trim() || t.name;
      nameEl.textContent = state.names[t.id];
      saveState();
    });

    card.addEventListener('click', () => flashTerritory(t));
    list.appendChild(card);
  }
}

// ─────────────────────────────────────────────
//  Bottom sheet (mobile) — drag to open/close
// ─────────────────────────────────────────────
const panel  = document.getElementById('panel');
const handle = document.getElementById('panel-handle');

let sheetDrag = null;

function sheetIsOpen() { return panel.classList.contains('open'); }

handle.addEventListener('click', () => panel.classList.toggle('open'));

// Touch drag no handle
handle.addEventListener('touchstart', e => {
  const t = e.touches[0];
  sheetDrag = { startY: t.clientY, wasOpen: sheetIsOpen() };
  panel.style.transition = 'none';
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!sheetDrag) return;
  const dy = e.touches[0].clientY - sheetDrag.startY;
  const h  = panel.offsetHeight;
  const peek = 82;
  let base = sheetDrag.wasOpen ? 0 : h - peek;
  let cur  = Math.max(0, Math.min(h - peek, base + dy));
  panel.style.transform = `translateY(${cur}px)`;
}, { passive: true });

window.addEventListener('touchend', e => {
  if (!sheetDrag) return;
  const dy = e.changedTouches[0].clientY - sheetDrag.startY;
  panel.style.transition = '';
  panel.style.transform  = '';
  if (sheetDrag.wasOpen) {
    if (dy > 60) panel.classList.remove('open');
    else         panel.classList.add('open');
  } else {
    if (dy < -40) panel.classList.add('open');
    else          panel.classList.remove('open');
  }
  sheetDrag = null;
});

// Fechar ao clicar no mapa (mobile)
document.getElementById('map-container').addEventListener('click', () => {
  if (window.innerWidth <= 768) panel.classList.remove('open');
});

// ─────────────────────────────────────────────
//  Reset
// ─────────────────────────────────────────────
document.getElementById('btn-reset-map').addEventListener('click', e => {
  e.stopPropagation();
  if (!confirm('Resetar o mapa? Todas as quadras voltarão a ter cor.')) return;
  state.visited = {};
  saveState();
  applyAllVisited();
  renderSidebar();
  updateStats();
});

// ─────────────────────────────────────────────
//  Carregamento do SVG
// ─────────────────────────────────────────────
async function loadMap() {
  try {
    const res = await fetch('./Mapa/MapaSem.svg');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = await res.text();

    const parser = new DOMParser();
    const doc    = parser.parseFromString(txt, 'image/svg+xml');
    if (doc.querySelector('parsererror')) throw new Error('SVG parse error');

    svgEl = doc.querySelector('svg');
    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
    svgEl.style.display = 'block';
    inner.appendChild(svgEl);

    setupBlockClicks();
    applyAllVisited();
    renderSidebar();
    updateStats();

    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(() => fitSvg(svgEl));

  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'flex';
  }
}

loadState();
loadMap();
</script>
</body>
</html>
