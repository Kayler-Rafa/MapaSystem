<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Mapa de Territórios</title>
  <link rel="icon" type="image/png" href="C.png">

  <!-- Firebase (sincronização entre dispositivos) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    /* ══ TEMA ══════════════════════════════════════════ */
    :root {
      --bg:           #dde2e8;
      --panel-bg:     #ffffff;

      --card-hover:   #f8fafc;
      --border:       #f1f5f9;
      --text-1:       #1e293b;
      --text-2:       #64748b;
      --text-3:       #94a3b8;
      --bar-track:    #f1f5f9;
      --glass-bg:     rgba(15, 23, 42, .86);
      --glass-text:   #ffffff;
      --reset-bg:     #fef2f2;
      --reset-border: #fca5a5;
      --reset-color:  #dc2626;
      --handle-color: #cbd5e1;
      --spinner-track:#cbd5e1;
      --spinner-fill: #3b82f6;
    }
    [data-theme="dark"] {
      --bg:           #0d1520;
      --panel-bg:     #1a2535;
      --panel-head:   #1a2535;
      --card-hover:   #1e2d40;
      --border:       #2d3f55;
      --text-1:       #e2eaf4;
      --text-2:       #8da4be;
      --text-3:       #4e6782;
      --bar-track:    #2d3f55;
      --glass-bg:     rgba(255, 255, 255, .10);
      --glass-text:   #e2eaf4;
      --reset-bg:     rgba(220,38,38,.15);
      --reset-border: rgba(220,38,38,.4);
      --reset-color:  #f87171;
      --handle-color: #2d3f55;
      --spinner-track:#2d3f55;
      --spinner-fill: #60a5fa;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }

    /* ══ MAPA FULL-SCREEN ══════════════════════════════ */
    #map-container { position: fixed; inset: 0; background: var(--bg); transition: background .3s; }
    #map-viewport  { position: absolute; inset: 0; cursor: grab; user-select: none; touch-action: none; }
    #map-viewport.dragging { cursor: grabbing; }
    #map-inner { position: relative; transform-origin: 0 0; will-change: transform; }
    #map-inner svg { display: block; }

    /* Camada visível (Mapa.svg) — mostra ruas e nomes, é onde a marcação aparece */
    #map-inner svg.view-layer { position: relative; pointer-events: none; }
    #map-inner svg.view-layer path { transition: opacity .12s; }
    #map-inner svg.view-layer path.visited {
      fill: #7a7a7a !important;
      fill-opacity: 1 !important;
    }
    #map-inner svg.view-layer path.hover:not(.visited) { opacity: .72; }
    #map-inner svg.view-layer path.flash { animation: flash .5s ease 2; }

    /* Camada de clique (MapaSem.svg) — invisível por cima, só as quadras captam clique */
    #map-inner svg.hit-layer {
      position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0;
    }
    #map-inner svg.hit-layer * { pointer-events: none; }
    #map-inner svg.hit-layer path.q-block { pointer-events: auto; cursor: pointer; }

    @keyframes flash {
      0%,100% { stroke: transparent; stroke-width: 0; }
      40%      { stroke: rgba(255,255,255,.9); stroke-width: 4px; }
    }

    /* ══ TOPBAR FLUTUANTE ══════════════════════════════ */
    #topbar {
      position: fixed; top: 14px; left: 14px; right: 14px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 30; pointer-events: none;
    }
    #topbar-left, #topbar-right { display: flex; align-items: center; gap: 8px; }
    .glass-pill {
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 14px;
      color: var(--glass-text);
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,.08);
    }
    #app-pill  { padding: 9px 14px; font-size: 0.88rem; font-weight: 700; display: flex; align-items: center; gap: 7px; }
    #stats-pill { padding: 7px 13px; font-size: 0.78rem; font-weight: 500; }
    #theme-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--glass-text);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      pointer-events: auto; transition: opacity .15s;
    }
    #theme-btn:hover { opacity: .8; }
    #sync-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #94a3b8;
      transition: background .4s;
    }
    #sync-dot.online  { background: #22c55e; }
    #sync-dot.offline { background: #94a3b8; }

    /* No desktop, topbar não invade o painel (290px + 28px de margem) */
    @media (min-width: 769px) {
      #stats-pill { display: none; }
      #topbar { right: calc(290px + 28px); }
    }

    /* ══ ZOOM ══════════════════════════════════════════ */
    #zoom-bar {
      position: fixed; left: 14px; bottom: 14px;
      display: flex; flex-direction: column; gap: 5px; z-index: 25;
    }
    .z-btn {
      width: 42px; height: 42px;
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
      cursor: pointer; font-size: 1.1rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-1); transition: background .12s, transform .1s;
    }
    .z-btn:hover  { opacity: .85; }
    .z-btn:active { transform: scale(.93); }

    /* ══ PAINEL ════════════════════════════════════════ */
    #panel {
      position: fixed;
      top: 14px; right: 14px; bottom: 14px;
      width: 290px;
      background: var(--panel-bg);
      border-radius: 18px;
      box-shadow: 0 4px 32px rgba(0,0,0,.14);
      display: flex; flex-direction: column;
      z-index: 20; overflow: hidden;
      transition: background .3s, box-shadow .3s;
    }

    /* zona de drag (handle + cabeçalho) */
    #sheet-drag-zone { flex-shrink: 0; cursor: pointer; }

    #panel-handle { display: none; padding: 10px 0 2px; justify-content: center; }
    #panel-handle span {
      width: 38px; height: 4px;
      background: var(--handle-color); border-radius: 2px; display: block;
      transition: background .15s;
    }

    #panel-head {
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .ph-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
    .ph-title { font-size: 0.7rem; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: .07em; }
    .ph-count { font-size: 0.76rem; color: var(--text-2); font-weight: 500; }
    .global-bar { height: 4px; background: var(--bar-track); border-radius: 2px; overflow: hidden; }
    .global-bar-fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width .4s; }

    /* Lista */
    #territory-list { flex: 1; overflow-y: auto; }
    #territory-list::-webkit-scrollbar { width: 3px; }
    #territory-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Card */
    .t-card {
      padding: 11px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .1s;
    }
    .t-card:hover { background: var(--card-hover); }
    .t-card:last-child { border-bottom: none; }
    .t-top { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
    .t-dot { width: 13px; height: 13px; border-radius: 4px; border: 1.5px solid rgba(0,0,0,.14); flex-shrink: 0; }
    .t-name {
      font-size: 0.875rem; font-weight: 600; color: var(--text-1);
      flex: 1; outline: none;
      border: 1px solid transparent; border-radius: 4px;
      padding: 1px 3px; background: transparent; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color .3s;
    }
    .t-name:focus { background: rgba(59,130,246,.08); border-color: #7dd3fc; cursor: text; }
    .t-pct { font-size: 0.72rem; color: var(--text-3); font-weight: 500; flex-shrink: 0; }
    .t-progress { height: 5px; background: var(--bar-track); border-radius: 3px; margin-bottom: 5px; overflow: hidden; }
    .t-bar { height: 100%; border-radius: 3px; transition: width .4s; }
    .t-info { font-size: 0.71rem; color: var(--text-3); }

    /* Rodapé */
    #panel-footer { padding: 10px 14px 14px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    #btn-reset-map {
      width: 100%; padding: 9px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--reset-color); background: var(--reset-bg);
      border: 1.5px solid var(--reset-border); border-radius: 10px;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #btn-reset-map:hover { background: var(--reset-color); color: #fff; border-color: var(--reset-color); }
    #btn-share-map {
      width: 100%; padding: 9px;
      font-size: 0.82rem; font-weight: 600;
      color: #fff; background: var(--spinner-fill);
      border: 1.5px solid var(--spinner-fill); border-radius: 8px;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #btn-share-map:hover { filter: brightness(1.08); }
    #btn-share-map:disabled { opacity: .6; cursor: default; }

    /* ══ MOBILE ════════════════════════════════════════ */
    @media (max-width: 768px) {
      #panel {
        top: auto; right: 0; left: 0; bottom: 0;
        width: 100%; height: 74vh;
        border-radius: 22px 22px 0 0;
        transform: translateY(calc(100% - 82px));
        transition: transform .32s cubic-bezier(.4, 0, .2, 1);
        box-shadow: 0 -6px 30px rgba(0,0,0,.18);
      }
      #panel.open { transform: translateY(0); }

      #panel-handle { display: flex; }

      /* Zona de drag visível: handle + cabeçalho (altura ~82px) */
      #sheet-drag-zone { touch-action: none; }

      /* Zoom acima do peek */
      #zoom-bar { left: auto; right: 14px; bottom: 96px; }

      #stats-pill { display: flex !important; }
    }

    /* ══ LOADING / ERRO ════════════════════════════════ */
    #loading {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); gap: 10px;
      font-size: 0.9rem; color: var(--text-2);
    }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 3px solid var(--spinner-track); border-top-color: var(--spinner-fill);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #err {
      display: none; position: fixed; inset: 0; z-index: 50;
      align-items: center; justify-content: center; background: var(--bg);
    }
    .err-box {
      background: var(--panel-bg); border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      padding: 28px 24px; max-width: 340px; text-align: center;
    }
    .err-box h2 { color: var(--reset-color); margin-bottom: 10px; }
    .err-box p  { font-size: 0.85rem; color: var(--text-2); line-height: 1.6; }
    .err-box code { background: var(--bar-track); padding: 2px 7px; border-radius: 4px; font-size: 0.82rem; color: var(--text-1); }
  </style>
</head>
<body>

<!-- Mapa full screen -->
<div id="map-container">
  <div id="map-viewport"><div id="map-inner"></div></div>
  <div id="loading"><div class="spinner"></div> Carregando mapa...</div>
  <div id="err">
    <div class="err-box">
      <h2>⚠️ Erro ao carregar</h2>
      <p>Execute na pasta do projeto:<br><br>
      <code>python -m http.server 8080</code><br><br>
      Depois acesse <code>localhost:8080</code></p>
    </div>
  </div>
</div>

<!-- Topbar flutuante -->
<div id="topbar">
  <div id="topbar-left">
    <div id="app-pill" class="glass-pill">
      <div id="sync-dot" class="offline" title="Armazenamento local"></div>
      🗺️ Territórios
    </div>
  </div>
  <div id="topbar-right">
    <div id="stats-pill" class="glass-pill">—</div>
    <button id="theme-btn" title="Alternar tema">🌙</button>
  </div>
</div>

<!-- Controles de zoom -->
<div id="zoom-bar">
  <button class="z-btn" id="z-in"  title="Ampliar">+</button>
  <button class="z-btn" id="z-out" title="Reduzir">−</button>
  <button class="z-btn" id="z-fit" title="Ajustar">⌂</button>
</div>

<!-- Painel de territórios -->
<div id="panel">
  <div id="sheet-drag-zone">
    <div id="panel-handle"><span></span></div>
    <div id="panel-head">
      <div class="ph-row">
        <span class="ph-title">Territórios</span>
        <span class="ph-count" id="panel-count">—</span>
      </div>
      <div class="global-bar"><div class="global-bar-fill" id="global-bar-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="territory-list"></div>
  <div id="panel-footer">
    <button id="btn-share-map">📤 Compartilhar mapa</button>
    <button id="btn-reset-map">↺ Resetar mapa</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIGURAÇÃO FIREBASE
//  Para sincronizar entre dispositivos:
//  1. Acesse console.firebase.google.com
//  2. Crie um projeto → Realtime Database → Criar banco
//  3. Em Regras, coloque: { "rules": { ".read": true, ".write": true } }
//  4. Em Visão geral do projeto → Adicionar app Web → copie o firebaseConfig
//  5. Cole o objeto abaixo substituindo o null
// ══════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAtb-LNOVPIoUu2lTCvD-UC7wsuIysFVeY",
  authDomain: "mapa-a4630.firebaseapp.com",
  databaseURL: "https://mapa-a4630-default-rtdb.firebaseio.com",
  projectId: "mapa-a4630",
  storageBucket: "mapa-a4630.firebasestorage.app",
  messagingSenderId: "4497521251",
  appId: "1:4497521251:web:ed3da5b33d73f98cc79656"
};

// ─────────────────────────────────────────────
//  Territórios
// ─────────────────────────────────────────────
const TERRITORIES = [
  { id: 'layer1', name: 'Ametista',  color: '#9966cc', gid: 'g134' },
  { id: 'layer2', name: 'Topázio',   color: '#08beee', gid: 'g110' },
  { id: 'layer3', name: 'Pérola',    color: '#d4a26a', gid: 'g111' },
  { id: 'layer4', name: 'Crisolito', color: '#d1b632', gid: 'g112' },
  { id: 'layer5', name: 'Jacinto',   color: '#c93d33', gid: 'g113' },
  { id: 'layer6', name: 'Esmeralda', color: '#0fad37', gid: 'g114' },
];

// ─────────────────────────────────────────────
//  Estado & persistência
// ─────────────────────────────────────────────
const STORE = 'mapa-territorios-v1';
let state = { visited: {}, names: {} };
let firebaseRef = null;

function migrateState(s) {
  if (!s.names)   s.names   = {};
  if (!s.visited) s.visited = {};
  // Limpa nomes no formato antigo "Território N" para que os novos nomes padrão apareçam
  TERRITORIES.forEach(t => {
    if (/^Territ[oó]rio\s+\d+$/i.test(s.names[t.id] ?? '')) delete s.names[t.id];
  });
  // Funde fragmentos antigos (ex: path269) na quadra canônica (path44)
  for (const [frag, target] of Object.entries(ALIAS)) {
    if (s.visited[frag]) s.visited[target] = true;
    delete s.visited[frag];
  }
  return s;
}

function loadState() {
  try {
    const r = localStorage.getItem(STORE);
    if (r) state = migrateState(Object.assign({ visited: {}, names: {} }, JSON.parse(r)));
  } catch (_) {}
}

function saveState() {
  if (firebaseRef) {
    firebaseRef.set(state).catch(console.error);
  } else {
    try { localStorage.setItem(STORE, JSON.stringify(state)); } catch (_) {}
  }
}

function initFirebase() {
  if (!FIREBASE_CONFIG) return;
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    const db  = firebase.database();
    firebaseRef = db.ref('estado');

    // Escuta mudanças em tempo real
    firebaseRef.on('value', snap => {
      const val = snap.val();
      if (!val) return;
      state = migrateState(Object.assign({ visited: {}, names: {} }, val));
      applyAllVisited();
      renderSidebar();
      updateStats();
    });

    // Indicador de conexão
    db.ref('.info/connected').on('value', snap => {
      const dot = document.getElementById('sync-dot');
      if (snap.val()) {
        dot.className = 'online';
        dot.title = 'Sincronizado com Firebase';
      } else {
        dot.className = 'offline';
        dot.title = 'Sem conexão';
      }
    });
  } catch (e) {
    console.error('Firebase init error:', e);
  }
}

// ─────────────────────────────────────────────
//  Tema (dark / light)
// ─────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem('tema', next);
}
document.getElementById('theme-btn').addEventListener('click', toggleTheme);

// Inicia com tema salvo; padrão é o modo claro
applyTheme(localStorage.getItem('tema') || 'light');

// ─────────────────────────────────────────────
//  Pan & Zoom
// ─────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
let panning = false, panStart = null, dragMoved = false;

const viewport = document.getElementById('map-viewport');
const inner    = document.getElementById('map-inner');

function applyTx() {
  inner.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
}
function fitSvg(svg) {
  const vr = viewport.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  const sw = vb.width  || +svg.getAttribute('width')  || 750;
  const sh = vb.height || +svg.getAttribute('height') || 1000;
  sc = Math.min(vr.width / sw, vr.height / sh) * 0.95;
  tx = (vr.width  - sw * sc) / 2;
  ty = (vr.height - sh * sc) / 2;
  applyTx();
}
function zoomAt(f, cx, cy) {
  const ns = Math.max(0.12, Math.min(12, sc * f));
  tx = cx - (cx - tx) * (ns / sc);
  ty = cy - (cy - ty) * (ns / sc);
  sc = ns; applyTx();
}

viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  panning = true; dragMoved = false;
  panStart = { ox: e.clientX - tx, oy: e.clientY - ty };
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  const nx = e.clientX - panStart.ox, ny = e.clientY - panStart.oy;
  if (Math.abs(nx - tx) + Math.abs(ny - ty) > 5) dragMoved = true;
  tx = nx; ty = ny; applyTx();
});
window.addEventListener('mouseup', () => {
  panning = false; viewport.classList.remove('dragging');
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoomAt(e.deltaY < 0 ? 1.12 : 0.89, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

let prevT = null, prevD = 0;
viewport.addEventListener('touchstart', e => {
  dragMoved = false;
  prevT = [...e.touches].map(t => ({ x: t.clientX, y: t.clientY }));
  if (e.touches.length === 2)
    prevD = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                       e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  if (!prevT || sheetDragging) return;
  if (e.touches.length === 1 && prevT.length === 1) {
    const dx = e.touches[0].clientX - prevT[0].x;
    const dy = e.touches[0].clientY - prevT[0].y;
    if (Math.abs(dx) + Math.abs(dy) > 5) dragMoved = true;
    tx += dx; ty += dy; applyTx();
    prevT = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
  } else if (e.touches.length === 2) {
    dragMoved = true;
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    const r = viewport.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    if (prevD) zoomAt(d / prevD, cx, cy);
    prevD = d;
    prevT = [...e.touches].map(t => ({ x: t.clientX, y: t.clientY }));
  }
}, { passive: true });
viewport.addEventListener('touchend', () => { prevT = null; });

function midOf() {
  const r = viewport.getBoundingClientRect();
  return [r.width / 2, r.height / 2];
}
document.getElementById('z-in').onclick  = () => { const [x,y]=midOf(); zoomAt(1.3,   x, y); };
document.getElementById('z-out').onclick = () => { const [x,y]=midOf(); zoomAt(1/1.3, x, y); };
document.getElementById('z-fit').onclick = () => { const s=inner.querySelector('svg'); if(s) fitSvg(s); };

// ─────────────────────────────────────────────
//  Bottom sheet drag (mobile)
// ─────────────────────────────────────────────
const panel      = document.getElementById('panel');
const dragZone   = document.getElementById('sheet-drag-zone');
const PEEK       = 82;

let sheetDragging = false;
let sheetDidDrag  = false;
let sheetStart    = 0;
let sheetWasOpen  = false;
let sheetCurTY    = 0;

function isMobile() { return window.innerWidth <= 768; }

dragZone.addEventListener('touchstart', e => {
  if (!isMobile()) return;
  sheetDragging = true;
  sheetDidDrag  = false;
  sheetStart    = e.touches[0].clientY;
  sheetWasOpen  = panel.classList.contains('open');
  sheetCurTY    = sheetWasOpen ? 0 : panel.offsetHeight - PEEK;
  panel.style.transition = 'none';
  prevT = null; // evita que o mapa pan ao mesmo tempo
}, { passive: true });

window.addEventListener('touchmove', e => {
  if (!sheetDragging) return;
  const dy  = e.touches[0].clientY - sheetStart;
  if (Math.abs(dy) > 8) sheetDidDrag = true;
  const h   = panel.offsetHeight;
  const min = 0, max = h - PEEK;
  const ty  = Math.max(min, Math.min(max, sheetCurTY + dy));
  panel.style.transform = `translateY(${ty}px)`;
}, { passive: true });

window.addEventListener('touchend', e => {
  if (!sheetDragging) return;
  sheetDragging = false;
  const dy = e.changedTouches[0].clientY - sheetStart;
  panel.style.transition = '';
  panel.style.transform  = '';
  if (sheetWasOpen) {
    if (dy > 60)  panel.classList.remove('open');
    else          panel.classList.add('open');
  } else {
    if (dy < -40) panel.classList.add('open');
    else          panel.classList.remove('open');
  }
});

// Tap no drag zone (sem arrastar) → toggle
dragZone.addEventListener('click', e => {
  if (!isMobile()) return;
  if (sheetDidDrag) { sheetDidDrag = false; return; }
  panel.classList.toggle('open');
});

// Fechar ao tocar no mapa
document.getElementById('map-container').addEventListener('click', () => {
  if (isMobile()) panel.classList.remove('open');
});

// ─────────────────────────────────────────────
//  Quadras
// ─────────────────────────────────────────────
let svgView = null;  // Mapa.svg  — camada visível (recebe o cinza)
let svgHit  = null;  // MapaSem.svg — camada invisível que captura os cliques

// Fragmentos que são "uma quadra só" mas no SVG ficaram em paths separados.
// Chave = id do fragmento, valor = id da quadra canônica (que é contada).
const ALIAS = { path43: 'path44' };
const canon = id => ALIAS[id] || id;

// Retorna a quadra canônica + todos os fragmentos que apontam pra ela
function fragmentsOf(canonId) {
  const out = [canonId];
  for (const [frag, target] of Object.entries(ALIAS))
    if (target === canonId) out.push(frag);
  return out;
}

function blockPaths(svg, t) {
  if (!svg) return [];
  const g = svg.getElementById(t.gid);
  return g ? Array.from(g.querySelectorAll(':scope > path')) : [];
}
function countBlocks(t) {
  // Funde fragmentos da mesma quadra (ex: path43 conta junto com path44)
  const seen = new Set();
  let done = 0, total = 0;
  for (const p of blockPaths(svgHit, t)) {
    const id = canon(p.id);
    if (seen.has(id)) continue;
    seen.add(id);
    total++;
    if (state.visited[id]) done++;
  }
  return { done, total };
}
function applyAllVisited() {
  if (!svgView) return;
  svgView.querySelectorAll('path.visited').forEach(p => p.classList.remove('visited'));
  for (const id in state.visited) {
    if (!state.visited[id]) continue;
    fragmentsOf(id).forEach(realId => {
      const p = svgView.getElementById(realId);
      if (p) p.classList.add('visited');
    });
  }
}
function setHover(canonId, on) {
  if (!svgView) return;
  fragmentsOf(canonId).forEach(realId => {
    const p = svgView.getElementById(realId);
    if (p) p.classList.toggle('hover', on);
  });
}
function setupBlockClicks() {
  // Quadras (filhas diretas dos grupos) + fragmentos (ALIAS); Set evita duplicar
  const clickable = new Set();
  for (const t of TERRITORIES) blockPaths(svgHit, t).forEach(p => clickable.add(p));
  for (const frag of Object.keys(ALIAS)) {
    const p = svgHit.getElementById(frag);
    if (p) clickable.add(p);
  }
  for (const p of clickable) {
    p.classList.add('q-block');
    p.addEventListener('pointerdown', () => { dragMoved = false; });
    p.addEventListener('mouseenter', () => setHover(canon(p.id), true));
    p.addEventListener('mouseleave', () => setHover(canon(p.id), false));
    p.addEventListener('click', e => {
      e.stopPropagation();
      if (dragMoved) return;
      const id = canon(p.id);
      state.visited[id] = !state.visited[id];
      applyAllVisited();
      saveState();
      renderSidebar();
      updateStats();
    });
  }
}
function flashTerritory(t) {
  blockPaths(svgView, t).forEach(p => {
    p.classList.remove('flash');
    void p.getBoundingClientRect().width;
    p.classList.add('flash');
    setTimeout(() => p.classList.remove('flash'), 1100);
  });
}

// ─────────────────────────────────────────────
//  Stats globais
// ─────────────────────────────────────────────
function updateStats() {
  let done = 0, total = 0;
  for (const t of TERRITORIES) { const c = countBlocks(t); done += c.done; total += c.total; }
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('stats-pill').textContent   = `${done} / ${total}`;
  document.getElementById('panel-count').textContent  = `${done} / ${total}`;
  document.getElementById('global-bar-fill').style.width = pct + '%';
}

// ─────────────────────────────────────────────
//  Renderização do painel
// ─────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function renderSidebar() {
  const list = document.getElementById('territory-list');
  list.innerHTML = '';
  for (const t of TERRITORIES) {
    const { done, total } = countBlocks(t);
    const pct  = total ? Math.round((done / total) * 100) : 0;
    const name = state.names[t.id] || t.name;

    const card = document.createElement('div');
    card.className = 't-card';
    card.innerHTML = `
      <div class="t-top">
        <div class="t-dot" style="background:${t.color}"></div>
        <div class="t-name" contenteditable="true" spellcheck="false">${escHtml(name)}</div>
        <span class="t-pct">${pct}%</span>
      </div>
      <div class="t-progress">
        <div class="t-bar" style="width:${pct}%;background:${t.color}"></div>
      </div>
      <div class="t-info">${done} de ${total} quadras trabalhadas</div>
    `;

    const nameEl = card.querySelector('.t-name');
    nameEl.addEventListener('click', e => e.stopPropagation());
    nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
    nameEl.addEventListener('blur', () => {
      state.names[t.id] = nameEl.textContent.trim() || t.name;
      nameEl.textContent = state.names[t.id];
      saveState();
    });

    card.addEventListener('click', () => flashTerritory(t));
    list.appendChild(card);
  }
}

// ─────────────────────────────────────────────
//  Compartilhar / Exportar PNG
//  Gambiarra: o site usa MapaSem.svg (hitbox limpa), mas a imagem
//  exportada é gerada a partir do MapaCompleto.svg (com ruas e nomes),
//  pintando de cinza as mesmas quadras marcadas. Os IDs de quadra
//  (path1..path106) são idênticos entre os dois arquivos.
// ─────────────────────────────────────────────
let mapaCompletoText = null;

async function preloadExportMap() {
  try {
    const res = await fetch('./Mapa/MapaCompleto.svg');
    if (res.ok) mapaCompletoText = await res.text();
  } catch (_) {}
}

async function buildExportBlob() {
  if (!mapaCompletoText) {
    const res = await fetch('./Mapa/MapaCompleto.svg');
    mapaCompletoText = await res.text();
  }
  const doc = new DOMParser().parseFromString(mapaCompletoText, 'image/svg+xml');
  const svg = doc.querySelector('svg');
  const vb  = svg.viewBox.baseVal;
  const W   = vb.width  || 1600;
  const H   = vb.height || 1600;

  // Renderiza em resolução maior para nitidez (SVG é vetorial → escala sem perda).
  // Teto de ~16M px para não estourar o limite de canvas do iOS Safari.
  const MAX_DIM    = 3600;
  const MAX_PIXELS = 16e6;
  let scale = MAX_DIM / Math.max(W, H);
  if (W * scale * H * scale > MAX_PIXELS) scale = Math.sqrt(MAX_PIXELS / (W * H));
  const cw = Math.round(W * scale);
  const ch = Math.round(H * scale);

  // Define o tamanho de render do SVG (mantém o viewBox) → rasteriza nítido em cw×ch
  svg.setAttribute('width',  cw);
  svg.setAttribute('height', ch);

  // Pinta de cinza as quadras trabalhadas (incluindo fragmentos)
  Object.keys(state.visited).forEach(id => {
    if (!state.visited[id]) return;
    fragmentsOf(id).forEach(realId => {
      const p = doc.getElementById(realId);
      if (p) { p.style.fill = '#7a7a7a'; p.style.fillOpacity = '1'; }
    });
  });

  const xml = new XMLSerializer().serializeToString(svg);
  const url = URL.createObjectURL(new Blob([xml], { type: 'image/svg+xml;charset=utf-8' }));
  const img = new Image();
  img.src = url;
  await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });

  const canvas = document.createElement('canvas');
  canvas.width  = cw;
  canvas.height = ch;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cw, ch);
  ctx.drawImage(img, 0, 0, cw, ch);
  URL.revokeObjectURL(url);

  return await new Promise(res => canvas.toBlob(res, 'image/png'));
}

document.getElementById('btn-share-map').addEventListener('click', async () => {
  const btn  = document.getElementById('btn-share-map');
  const orig = btn.textContent;
  btn.disabled    = true;
  btn.textContent = '⏳ Gerando imagem...';
  try {
    const blob = await buildExportBlob();
    const file = new File([blob], 'mapa-territorios.png', { type: 'image/png' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Mapa de Territórios' });
    } else {
      const a = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'mapa-territorios.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }
  } catch (e) {
    if (e.name !== 'AbortError') {   // AbortError = usuário cancelou o share
      console.error(e);
      alert('Não foi possível gerar a imagem.');
    }
  } finally {
    btn.disabled    = false;
    btn.textContent = orig;
  }
});

// ─────────────────────────────────────────────
//  Reset
// ─────────────────────────────────────────────
document.getElementById('btn-reset-map').addEventListener('click', e => {
  e.stopPropagation();
  if (!confirm('Resetar o mapa? Todas as quadras voltarão a ter cor.')) return;
  state.visited = {};
  saveState();
  applyAllVisited();
  renderSidebar();
  updateStats();
});

// ─────────────────────────────────────────────
//  Carregamento do SVG
// ─────────────────────────────────────────────
function parseSvg(txt) {
  const doc = new DOMParser().parseFromString(txt, 'image/svg+xml');
  if (doc.querySelector('parsererror')) throw new Error('SVG parse error');
  const svg = doc.querySelector('svg');
  svg.removeAttribute('width');
  svg.removeAttribute('height');
  svg.style.display = 'block';
  return svg;
}

async function loadMap() {
  try {
    const [viewTxt, hitTxt] = await Promise.all([
      fetch('./Mapa/Mapa.svg').then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); }),
      fetch('./Mapa/MapaSem.svg').then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); }),
    ]);

    svgView = parseSvg(viewTxt);
    svgHit  = parseSvg(hitTxt);
    svgView.classList.add('view-layer');
    svgHit.classList.add('hit-layer');
    // A camada de clique é invisível: remove textos/decorações para aliviar a
    // renderização (não afetam o hit-test das quadras, que são <path>).
    svgHit.querySelectorAll('text, tspan, ellipse, image').forEach(el => el.remove());
    inner.appendChild(svgView);  // visível embaixo
    inner.appendChild(svgHit);   // invisível por cima

    setupBlockClicks();
    applyAllVisited();
    renderSidebar();
    updateStats();

    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(() => fitSvg(svgView));
  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'flex';
  }
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
loadState();
initFirebase();
loadMap();
preloadExportMap();
</script>
