<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Territórios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-h: 52px;
      --sidebar-w: 300px;
      --accent: #1a73e8;
      --visited-fill: #8e8e8e;
      --card-bg: #fff;
      --bg: #e8eaed;
    }

    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100%; }

    header {
      height: var(--header-h);
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      flex-shrink: 0;
      z-index: 30;
    }
    header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
    #global-stats {
      font-size: 0.78rem;
      background: rgba(255,255,255,.2);
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    #body { flex: 1; display: flex; overflow: hidden; position: relative; }

    /* ── Map ── */
    #map-container { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
    #map-viewport {
      position: absolute; inset: 0;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }
    #map-viewport.dragging { cursor: grabbing; }
    #map-inner { transform-origin: 0 0; will-change: transform; }
    #map-inner svg { display: block; }

    /* ── SVG block interactivity ── */
    #map-inner svg path { cursor: default; }
    #map-inner svg path.q-block { cursor: pointer; transition: opacity .12s; }
    #map-inner svg path.q-block:hover { opacity: .72; }
    #map-inner svg path.q-block.visited {
      fill: var(--visited-fill) !important;
      fill-opacity: 1 !important;
    }
    @keyframes flash {
      0%,100% { stroke: transparent; stroke-width: 0; }
      40%      { stroke: #fff; stroke-width: 4px; }
    }
    #map-inner svg path.flash { animation: flash .55s ease 2; }

    /* ── Zoom controls ── */
    #zoom-bar {
      position: absolute; right: 12px; bottom: 16px;
      display: flex; flex-direction: column; gap: 4px; z-index: 10;
    }
    .z-btn {
      width: 38px; height: 38px;
      background: #fff; border: none; border-radius: 8px;
      box-shadow: 0 1px 6px rgba(0,0,0,.25);
      cursor: pointer; font-size: 1.1rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      color: #333;
    }
    .z-btn:hover { background: #f0f0f0; }
    .z-btn:active { background: #e0e0e0; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--card-bg);
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: -2px 0 10px rgba(0,0,0,.1);
      flex-shrink: 0;
      z-index: 20;
    }
    #sidebar-head {
      padding: 10px 14px;
      font-size: 0.75rem; font-weight: 700;
      color: #555; text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid #eee;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .btn-icon {
      font-size: 0.72rem; color: #aaa;
      background: none; border: none; cursor: pointer; padding: 2px 6px;
      border-radius: 4px;
    }
    .btn-icon:hover { color: #c33; background: #fef; }

    #territory-list { flex: 1; overflow-y: auto; }
    #territory-list::-webkit-scrollbar { width: 4px; }
    #territory-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    #sidebar-footer {
      padding: 12px 14px;
      border-top: 1px solid #eee;
      flex-shrink: 0;
    }
    #btn-reset-map {
      width: 100%; padding: 9px;
      font-size: 0.85rem; font-weight: 600;
      color: #c0392b;
      background: #fff5f5;
      border: 1.5px solid #e74c3c;
      border-radius: 8px; cursor: pointer;
      transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    #btn-reset-map:hover { background: #e74c3c; color: #fff; }

    /* ── Territory card ── */
    .t-card {
      padding: 12px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background .1s;
    }
    .t-card:hover { background: #fafafa; }
    .t-card:last-child { border-bottom: none; }

    .t-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .t-dot {
      width: 14px; height: 14px; border-radius: 4px;
      border: 1.5px solid rgba(0,0,0,.18); flex-shrink: 0;
    }
    .t-name {
      font-size: 0.875rem; font-weight: 600; color: #222;
      flex: 1; outline: none;
      border: 1px solid transparent; border-radius: 4px;
      padding: 1px 3px; background: transparent; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .t-name:focus { background: #f0f4ff; border-color: var(--accent); cursor: text; }

    .t-progress {
      height: 5px; background: #eee; border-radius: 3px;
      margin-bottom: 7px; overflow: hidden;
    }
    .t-bar { height: 100%; border-radius: 3px; transition: width .35s; }

    .t-info { font-size: 0.73rem; color: #888; display: flex; gap: 8px; }

    /* ── Mobile ── */
    #mob-fab {
      display: none;
      position: absolute; left: 12px; bottom: 16px; z-index: 15;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      box-shadow: 0 3px 12px rgba(0,0,0,.3); cursor: pointer;
      font-size: 1.2rem; align-items: center; justify-content: center;
    }
    #mob-handle {
      display: none; padding: 10px; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    #mob-handle span {
      width: 36px; height: 4px; background: #ddd; border-radius: 2px; display: block;
    }

    @media (max-width: 768px) {
      #sidebar {
        position: absolute; bottom: 0; left: 0; right: 0; width: 100%;
        height: 55vh; max-height: 72vh;
        border-radius: 18px 18px 0 0;
        transform: translateY(100%);
        transition: transform .3s cubic-bezier(.4,0,.2,1);
        box-shadow: 0 -4px 20px rgba(0,0,0,.18);
      }
      #sidebar.open { transform: translateY(0); }
      #mob-fab { display: flex; }
      #mob-handle { display: flex; }
    }

    /* ── Error overlay ── */
    #err {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: var(--bg); z-index: 5;
    }
    .err-box {
      background: #fff; border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      padding: 28px 24px; max-width: 340px; text-align: center;
    }
    .err-box h2 { color: #c33; margin-bottom: 10px; }
    .err-box p { font-size: 0.85rem; color: #555; line-height: 1.6; }
    .err-box code {
      display: inline-block; background: #f5f5f5;
      padding: 3px 8px; border-radius: 4px;
      font-size: 0.82rem; margin: 2px 0;
    }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 5;
      font-size: 0.9rem; color: #666; gap: 10px;
    }
    .spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 3px solid #ddd; border-top-color: var(--accent);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>🗺️ Mapa de Territórios</h1>
    <span id="global-stats">—</span>
  </header>

  <div id="body">
    <div id="map-container">
      <div id="loading"><div class="spinner"></div> Carregando mapa...</div>

      <div id="map-viewport">
        <div id="map-inner"></div>
      </div>

      <div id="zoom-bar">
        <button class="z-btn" id="z-in"  title="Ampliar">+</button>
        <button class="z-btn" id="z-out" title="Reduzir">−</button>
        <button class="z-btn" id="z-fit" title="Ajustar tela">⌂</button>
      </div>

      <button id="mob-fab" aria-label="Abrir painel de territórios">☰</button>

      <div id="err">
        <div class="err-box">
          <h2>⚠️ Erro ao carregar</h2>
          <p>O mapa não pôde ser carregado.<br><br>
          Para usar localmente, abra um terminal na pasta do projeto e execute:<br><br>
          <code>python -m http.server 8080</code><br><br>
          Depois acesse <code>http://localhost:8080</code> no navegador.</p>
        </div>
      </div>
    </div>

    <aside id="sidebar">
      <div id="mob-handle"><span></span></div>
      <div id="sidebar-head">
        <span>Territórios</span>
      </div>
      <div id="territory-list"></div>
      <div id="sidebar-footer">
        <button id="btn-reset-map">↺ Resetar mapa</button>
      </div>
    </aside>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Configuração dos territórios
//  (Edite os nomes como preferir — ou renomeie
//   direto na interface clicando no nome.)
// ─────────────────────────────────────────────
const TERRITORIES = [
  { id: 'layer1', name: 'Território 1', color: '#9966cc', gid: 'g134' },
  { id: 'layer2', name: 'Território 2', color: '#08beee', gid: 'g110' },
  { id: 'layer3', name: 'Território 3', color: '#d4a26a', gid: 'g111' },
  { id: 'layer4', name: 'Território 4', color: '#d1b632', gid: 'g112' },
  { id: 'layer5', name: 'Território 5', color: '#c93d33', gid: 'g113' },
  { id: 'layer6', name: 'Território 6', color: '#0fad37', gid: 'g114' },
];

// ─────────────────────────────────────────────
//  Estado persistente
// ─────────────────────────────────────────────
const STORE = 'mapa-territorios-v1';
let state = { visited: {}, names: {} };

function loadState() {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw) state = Object.assign({ visited: {}, names: {} }, JSON.parse(raw));
  } catch (_) {}
}
function saveState() {
  try { localStorage.setItem(STORE, JSON.stringify(state)); } catch (_) {}
}

// ─────────────────────────────────────────────
//  Pan & Zoom
// ─────────────────────────────────────────────
let tx = 0, ty = 0, sc = 1;
let panning = false, panStart = null;
let dragMoved = false;

const viewport = document.getElementById('map-viewport');
const inner    = document.getElementById('map-inner');

function applyTx() {
  inner.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
}

function fitSvg(svgEl) {
  const vr = viewport.getBoundingClientRect();
  const vb = svgEl.viewBox.baseVal;
  const sw = vb.width  || +svgEl.getAttribute('width')  || 750;
  const sh = vb.height || +svgEl.getAttribute('height') || 1000;
  sc = Math.min(vr.width / sw, vr.height / sh) * 0.95;
  tx = (vr.width  - sw * sc) / 2;
  ty = (vr.height - sh * sc) / 2;
  applyTx();
}

function zoomAt(factor, cx, cy) {
  const nsc = Math.max(0.12, Math.min(12, sc * factor));
  tx = cx - (cx - tx) * (nsc / sc);
  ty = cy - (cy - ty) * (nsc / sc);
  sc = nsc;
  applyTx();
}

// Mouse pan
viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  panning = true; dragMoved = false;
  panStart = { ox: e.clientX - tx, oy: e.clientY - ty };
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  const nx = e.clientX - panStart.ox, ny = e.clientY - panStart.oy;
  if (Math.abs(nx - tx) + Math.abs(ny - ty) > 5) dragMoved = true;
  tx = nx; ty = ny; applyTx();
});
window.addEventListener('mouseup', () => {
  panning = false;
  viewport.classList.remove('dragging');
});
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoomAt(e.deltaY < 0 ? 1.12 : 0.89, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

// Touch pan & pinch-zoom
let prevTouches = null, prevDist = 0;
viewport.addEventListener('touchstart', e => {
  dragMoved = false;
  prevTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  if (e.touches.length === 2)
    prevDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                          e.touches[0].clientY - e.touches[1].clientY);
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  if (!prevTouches) return;
  if (e.touches.length === 1 && prevTouches.length === 1) {
    const dx = e.touches[0].clientX - prevTouches[0].x;
    const dy = e.touches[0].clientY - prevTouches[0].y;
    if (Math.abs(dx) + Math.abs(dy) > 5) dragMoved = true;
    tx += dx; ty += dy; applyTx();
    prevTouches = [{ x: e.touches[0].clientX, y: e.touches[0].clientY }];
  } else if (e.touches.length === 2) {
    dragMoved = true;
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    const r = viewport.getBoundingClientRect();
    const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - r.left;
    const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - r.top;
    if (prevDist) zoomAt(d / prevDist, cx, cy);
    prevDist = d;
    prevTouches = Array.from(e.touches).map(t => ({ x: t.clientX, y: t.clientY }));
  }
}, { passive: true });
viewport.addEventListener('touchend', () => { prevTouches = null; });

// Zoom buttons
function centerOf() {
  const r = viewport.getBoundingClientRect();
  return [r.width / 2, r.height / 2];
}
document.getElementById('z-in').onclick  = () => { const [cx,cy] = centerOf(); zoomAt(1.3,  cx, cy); };
document.getElementById('z-out').onclick = () => { const [cx,cy] = centerOf(); zoomAt(1/1.3,cx, cy); };
document.getElementById('z-fit').onclick = () => { const svg = inner.querySelector('svg'); if (svg) fitSvg(svg); };

// ─────────────────────────────────────────────
//  Gerenciamento dos blocos (quadras)
// ─────────────────────────────────────────────
let svgEl = null;

function blockPaths(t) {
  if (!svgEl) return [];
  const g = svgEl.getElementById(t.gid);
  if (!g) return [];
  return Array.from(g.querySelectorAll(':scope > path'));
}

function countBlocks(t) {
  const paths = blockPaths(t);
  return { done: paths.filter(p => state.visited[p.id]).length, total: paths.length };
}

function applyAllVisited() {
  for (const t of TERRITORIES) {
    for (const p of blockPaths(t)) {
      p.classList.toggle('visited', !!state.visited[p.id]);
    }
  }
}

function setupBlockClicks() {
  for (const t of TERRITORIES) {
    for (const p of blockPaths(t)) {
      p.classList.add('q-block');
      // Reset dragMoved on each block's pointerdown so a fresh click
      // is never blocked by a prior pan gesture.
      p.addEventListener('pointerdown', () => { dragMoved = false; });
      p.addEventListener('click', e => {
        e.stopPropagation();
        if (dragMoved) return;
        state.visited[p.id] = !state.visited[p.id];
        p.classList.toggle('visited', !!state.visited[p.id]);
        saveState();
        renderSidebar();
        updateStats();
      });
    }
  }
}

function flashTerritory(t) {
  const paths = blockPaths(t);
  paths.forEach(p => {
    p.classList.remove('flash');
    void p.offsetWidth; // reflow to restart animation
    p.classList.add('flash');
    setTimeout(() => p.classList.remove('flash'), 1200);
  });
}

// ─────────────────────────────────────────────
//  Stats globais
// ─────────────────────────────────────────────
function updateStats() {
  let done = 0, total = 0;
  for (const t of TERRITORIES) {
    const c = countBlocks(t);
    done += c.done; total += c.total;
  }
  document.getElementById('global-stats').textContent =
    total ? `${done} / ${total} quadras` : '—';
}

// ─────────────────────────────────────────────
//  Sidebar / painel de territórios
// ─────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('territory-list');
  list.innerHTML = '';

  for (const t of TERRITORIES) {
    const { done, total } = countBlocks(t);
    const pct = total ? Math.round((done / total) * 100) : 0;
    const name = state.names[t.id] || t.name;

    const card = document.createElement('div');
    card.className = 't-card';
    card.innerHTML = `
      <div class="t-top">
        <div class="t-dot" style="background:${t.color}"></div>
        <div class="t-name" contenteditable="true" spellcheck="false">${escHtml(name)}</div>
      </div>
      <div class="t-progress">
        <div class="t-bar" style="width:${pct}%;background:${t.color}"></div>
      </div>
      <div class="t-info">
        <span>${done}/${total} quadras trabalhadas</span>
        <span>${pct}% concluído</span>
      </div>
    `;

    // Renomear território
    const nameEl = card.querySelector('.t-name');
    nameEl.addEventListener('click', e => e.stopPropagation());
    nameEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });
    nameEl.addEventListener('blur', () => {
      const v = nameEl.textContent.trim();
      state.names[t.id] = v || t.name;
      nameEl.textContent = state.names[t.id];
      saveState();
    });

    // Flash no mapa ao clicar no card
    card.addEventListener('click', () => flashTerritory(t));

    list.appendChild(card);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  Sidebar mobile
// ─────────────────────────────────────────────
const sidebar   = document.getElementById('sidebar');
const mobFab    = document.getElementById('mob-fab');
const mobHandle = document.getElementById('mob-handle');

mobFab.addEventListener('click',    () => sidebar.classList.toggle('open'));
mobHandle.addEventListener('click', () => sidebar.classList.toggle('open'));

// Fecha sidebar ao clicar no mapa (mobile)
document.getElementById('map-container').addEventListener('click', () => {
  if (window.innerWidth <= 768) sidebar.classList.remove('open');
});

// ─────────────────────────────────────────────
//  Reset
// ─────────────────────────────────────────────
document.getElementById('btn-reset-map').addEventListener('click', () => {
  if (!confirm('Resetar o mapa? Todas as quadras voltarão a ter cor.')) return;
  state.visited = {};
  saveState();
  applyAllVisited();
  renderSidebar();
  updateStats();
});

// ─────────────────────────────────────────────
//  Carregamento do SVG
// ─────────────────────────────────────────────
async function loadMap() {
  try {
    const res = await fetch('./Mapa/MapaSem.svg');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = await res.text();

    const parser = new DOMParser();
    const doc = parser.parseFromString(txt, 'image/svg+xml');
    const parserErr = doc.querySelector('parsererror');
    if (parserErr) throw new Error('SVG parse error');

    svgEl = doc.querySelector('svg');
    svgEl.removeAttribute('width');
    svgEl.removeAttribute('height');
    svgEl.style.display = 'block';

    inner.appendChild(svgEl);

    setupBlockClicks();
    applyAllVisited();
    renderSidebar();
    updateStats();

    document.getElementById('loading').style.display = 'none';
    requestAnimationFrame(() => fitSvg(svgEl));

  } catch (e) {
    console.error('Erro ao carregar mapa:', e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').style.display = 'flex';
  }
}

loadState();
loadMap();
</script>
</body>
</html>
